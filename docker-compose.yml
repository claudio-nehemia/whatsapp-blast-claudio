version: '3.8'

services:
  mongodb:
    image: mongo:6.0
    container_name: whatsapp_mongodb
    restart: always
    volumes:
      - mongo_data:/data/db
    networks:
      - whatsapp_net

  whatsapp-service:
    build:
      context: ./whatsapp-service
      dockerfile: Dockerfile
      network: host
    container_name: whatsapp_node_gateway
    restart: always
    environment:
      - PORT=5000
      - RUST_BACKEND_URL=http://backend:8000
    volumes:
      - whatsapp_sessions:/app/storage/session
      - backend_uploads:/app/storage/uploads
    depends_on:
      - backend
    networks:
      - whatsapp_net

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      network: host
    container_name: whatsapp_rust_backend
    restart: always
    environment:
      - PORT=8000
      - MONGO_URI=mongodb://mongodb:27017/whatsapp_blast
      - WHATSAPP_SERVICE_URL=http://whatsapp-service:5000
      - JWT_SECRET=${JWT_SECRET}
      - GROQ_API_KEY=${GROQ_API_KEY}
    volumes:
      - backend_uploads:/app/storage/uploads
    depends_on:
      - mongodb
    networks:
      - whatsapp_net

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      network: host
    container_name: whatsapp_react_frontend
    restart: always
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - whatsapp_net

volumes:
  mongo_data:
  whatsapp_sessions:
  backend_uploads:

networks:
  whatsapp_net:
    driver: bridge
